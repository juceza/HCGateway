# detekt overrides — merged on top of the default ruleset (buildUponDefaultConfig
# = true in app/build.gradle.kts). Only the deviations from defaults live here.
#
# Formatting is owned by Spotless/ktlint, so the detekt-formatting ruleset is not
# enabled here. These tweaks adapt the defaults to Jetpack Compose / Android.

naming:
  # @Composable functions are PascalCase by convention (HomeScreen, SyncCard…).
  FunctionNaming:
    ignoreAnnotated: ['Composable']

complexity:
  # Composable functions legitimately take many UI parameters (state + lambdas).
  LongParameterList:
    ignoreAnnotated: ['Composable']

style:
  # dp/sp/duration literals are pervasive and readable in Compose UI code;
  # flagging every one as a "magic number" is pure noise.
  MagicNumber:
    active: false
  # Compose preview/entry functions can look "unused" to static analysis.
  UnusedPrivateMember:
    ignoreAnnotated: ['Composable', 'Preview']
